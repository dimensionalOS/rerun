name: Build Interactive Viewer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            xvfb \
            libxkbcommon-x11-0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build viewer
        run: cargo build --release -p custom_callback

      - name: Run tests
        run: cargo test -p custom_callback

      - name: Package binary
        run: |
          cd target/release
          strip custom_callback_viewer
          tar -czf dimos-viewer-${{ github.ref_name }}-linux-x64.tar.gz custom_callback_viewer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dimos-viewer-linux-x64
          path: target/release/dimos-viewer-*.tar.gz

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build viewer
        run: cargo build --release -p custom_callback

      - name: Run tests
        run: cargo test -p custom_callback

      - name: Package binary
        run: |
          cd target/release
          strip custom_callback_viewer
          tar -czf dimos-viewer-${{ github.ref_name }}-macos-arm64.tar.gz custom_callback_viewer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dimos-viewer-macos-arm64
          path: target/release/dimos-viewer-*.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/dimos-viewer-*.tar.gz
          generate_release_notes: true
